name: Daily +1 Reviewer Rotation

on:
  # NOTE: The scheduled fire used to live here as `cron: "7 13,14 * * 1-5"`
  # but GitHub Actions schedules on public repos with low activity proved
  # unreliable (sometimes 2.5h late, sometimes skipped entirely). The daily
  # fire is now driven by macOS launchd on Kyle's laptop:
  #   ~/Library/LaunchAgents/com.follmer.plusone-bot.plist  +  ~/bin/plusone-bot.sh
  # workflow_dispatch is preserved so the workflow can still be triggered
  # manually from the GitHub UI / `gh workflow run` for ad-hoc tests.
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Should we run? (skip off-hour cron fires)
        id: should_run
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; exit 0
          fi
          ET_HOUR=$(TZ=America/New_York date +%H)
          # Allow 09 (on-time) and 10 (the second cron's complement during
          # the wrong-DST half of the year). On EDT we want :07 of 13 UTC = 9:07am ET
          # → ET_HOUR=09 fires; the 14 UTC fire = 10:07am ET → ET_HOUR=10 skips.
          # On EST we want :07 of 14 UTC = 9:07am ET → ET_HOUR=09 fires; the 13 UTC
          # fire = 8:07am ET → ET_HOUR=08 skips. Only ET_HOUR=09 should run.
          if [ "$ET_HOUR" = "09" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "It's 9am ET (hour=$ET_HOUR), running."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Off-hour fire (ET hour=$ET_HOUR); skipping downstream steps."
          fi

      - name: Compute today's +1
        if: steps.should_run.outputs.run == 'true'
        id: compute
        run: |
          set -euo pipefail
          REVIEWERS_JSON=$(cat data/reviewers.json)
          N=$(echo "$REVIEWERS_JSON" | jq 'length')
          EPOCH_DAYS=$(( ( $(date -u +%s) - $(date -u -d '2026-01-01' +%s) ) / 86400 ))
          TODAY_IDX=$(( EPOCH_DAYS % N ))
          TODAY=$(echo "$REVIEWERS_JSON" | jq ".[${TODAY_IDX}]")
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          jq -n --argjson today "$TODAY" --arg now "$NOW" \
            '{ today: $today, computed_at: $now }' > data/today.json
          cat data/today.json

          # Expose to subsequent steps
          REVIEWER_ID=$(echo "$TODAY" | jq -r .slack_id)
          REVIEWER_NAME=$(echo "$TODAY" | jq -r .name)
          echo "reviewer_id=${REVIEWER_ID}" >> "$GITHUB_OUTPUT"
          echo "reviewer_name=${REVIEWER_NAME}" >> "$GITHUB_OUTPUT"

      - name: Commit if changed
        if: steps.should_run.outputs.run == 'true'
        run: |
          if git diff --quiet data/today.json; then
            echo "No change."; exit 0
          fi
          git config user.name "plusone-bot"
          git config user.email "plusone-bot@users.noreply.github.com"
          git add data/today.json
          git commit -m "rotate: $(jq -r .today.name data/today.json)"
          git push

      - name: Post to Slack via webhook
        if: steps.should_run.outputs.run == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REVIEWER_ID: ${{ steps.compute.outputs.reviewer_id }}
          REVIEWER_NAME: ${{ steps.compute.outputs.reviewer_name }}
        run: |
          set -euo pipefail
          if [ -z "${SLACK_WEBHOOK_URL:-}" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping Slack notify."
            exit 0
          fi
          # The WfB workflow holds the entire message body as a static string
          # with `{{reviewer_user}}` embedded inline. The Slack-User-ID variable
          # type is what makes the @-mention render as a real ping; text-typed
          # variables get HTML-escaped and don't notify.
          PAYLOAD=$(jq -n --arg reviewer_user "$REVIEWER_ID" '{ reviewer_user: $reviewer_user }')
          echo "Posting payload for reviewer: $REVIEWER_NAME"
          HTTP_CODE=$(curl -s -o /tmp/slack_response.txt -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL")
          echo "Slack HTTP status: $HTTP_CODE"
          if [ -s /tmp/slack_response.txt ]; then
            echo "Response body:"
            cat /tmp/slack_response.txt
          fi
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "ERROR: Slack webhook returned $HTTP_CODE"
            exit 1
          fi
